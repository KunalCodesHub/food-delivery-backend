# src/main/resources/application.yml

spring:
  application:
    name: food-delivery-app

  datasource:
    url: jdbc:mysql://localhost:3306/food_delivery_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  main:
    web-application-type: servlet

server:
  port: 8081

jwt:
  secret: myVeryLongSecretKeyForJWTFoodDeliveryApp123456789
  expiration: 86400000

logging:
  level:
    com.fooddelivery: DEBUG
    org.springframework.security: INFO